<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Website</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .message-box {
            background: #ffffff;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
        }

        h1 {
            color: #007BFF;
            margin-bottom: 15px;
        }

        p {
            color: #555;
            font-size: 18px;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="message-box">
    <h1>Welcome!</h1>
    <p>Hi, this is my sample website.</p>
</div>

</body>
</html>
